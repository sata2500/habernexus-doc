services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: habernexus-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./dev.db
      # Diğer .env değişkenleri buraya veya .env dosyasına eklenecek
    volumes:
      - ./apps/web/public/uploads:/app/apps/web/public/uploads
      - ./data:/app/apps/web/prisma # SQLite veritabanı için kalıcı alan
    restart: always

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: habernexus-tunnel
    restart: always
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel run
    depends_on:
      - web
